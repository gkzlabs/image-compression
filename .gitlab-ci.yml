# GitLab CI/CD for @gkz/image-compression
#
# Pipeline stages:
#   1. lint    — TypeScript strict type check
#   2. test    — Vitest unit + integration tests
#   3. build   — esbuild bundle + tsc declarations
#   4. size    — Bundle size budget enforcement
#
# All jobs use the project's node version (from .nvmrc if present).
# The build artifact (dist/) is shared between jobs to avoid rebuilding.

image: node:20-alpine

# Cache node_modules across pipeline runs for faster CI
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

stages:
  - lint
  - test
  - build
  - size

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  # Suppress esbuild's direct-eval warning (intentional in tryDecodeHEICLazy)
  CI: "true"

# ---------------------------------------------------------------------------
# Lint — TypeScript strict type check (no emit)
# ---------------------------------------------------------------------------
lint:
  stage: lint
  script:
    - npm ci --prefer-offline --no-audit
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Test — Vitest unit + integration tests
# ---------------------------------------------------------------------------
test:
  stage: test
  script:
    - npm ci --prefer-offline --no-audit
    - npm test
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage/
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Build — esbuild bundle + tsc declarations
# ---------------------------------------------------------------------------
build:
  stage: build
  script:
    - npm ci --prefer-offline --no-audit
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Size — Bundle size budget enforcement (only after build)
# ---------------------------------------------------------------------------
size:
  stage: size
  needs:
    - build
  script:
    - npm ci --prefer-offline --no-audit
    - npm run size
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  allow_failure: true # size growth is informational, not a hard fail