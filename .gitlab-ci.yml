# GitLab CI/CD for @GKz/image-compression

stages:
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

# =============================================================================
# Cache node_modules between jobs
# =============================================================================
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

# =============================================================================
# Test job — run on every push and MR
# =============================================================================
test:unit:
  stage: test
  image: node:${NODE_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm test
  artifacts:
    when: on_failure
    paths:
      - coverage/
    expire_in: 30 days

# =============================================================================
# Build job — verify the package builds
# =============================================================================
build:package:
  stage: build
  image: node:${NODE_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# =============================================================================
# Publish job — publish to GitLab Package Registry on tag
# =============================================================================
publish:package:
  stage: deploy
  image: node:${NODE_VERSION}
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Publishing @GKz/image-compression@${CI_COMMIT_TAG} to GitLab Package Registry"
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - |
      cat > .npmrc << EOF
      @GKz:registry=https://${CI_SERVER_HOST}/api/v4/packages/npm/
      //${CI_SERVER_HOST}/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}
      EOF
    - npm publish --access public
  dependencies:
    - build:package
