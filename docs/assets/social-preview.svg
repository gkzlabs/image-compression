      <circle cx="22" cy="22" r="4" fill="#c9a26b"/>
      <text x="22" y="50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="12" fill="#8aa0d8" font-weight="500" letter-spacing="1.5">PATH 4</text>
      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">server-fallback</text>
    </g>
  </g>

