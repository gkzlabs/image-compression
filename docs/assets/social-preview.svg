<?xml version="1.0" encoding="UTF-8"?>
<!--
  Social preview for @gkzlabs/image-compression
  Dimensions: 1280×640 (2:1, GitHub/Twitter card spec)
  Render to PNG: rsvg-convert -w 1280 -h 640 -f png social-preview.svg -o social-preview.png
  Hand-crafted SVG (no external fonts/emoji) so the PNG render is small and stable.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="@gkzlabs/image-compression — framework-agnostic image compression for the browser. 4-path cascade: webcodecs-worker, offscreen-worker, canvas-main, server-fallback. Works with React, Vue, Svelte, Angular, vanilla JS. Live demo at gkzlabs.github.io/image-compression.">
  <defs>
    <!-- Background gradient: deep navy → mid navy → deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.5" stop-color="#15204a"/>
      <stop offset="1" stop-color="#0a0f1f"/>
    </linearGradient>

    <!-- Soft glow at the upper center -->
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#5d7dff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5d7dff" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent gradient (used for the hero underline + arrows) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#9c7cff"/>
    </linearGradient>

    <!-- Chip background gradient -->
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2548" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0e1530" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Subtle inner border glow for chips -->
    <linearGradient id="chipStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a5fa0" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2a3766" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- TOP-LEFT PACKAGE BADGE (no emoji, pure SVG) -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="244" height="40" rx="20" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
    <circle cx="22" cy="20" r="5" fill="#5dd39e"/>
    <text x="40" y="27" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#cbd5ff" font-weight="600" letter-spacing="-0.2">@gkzlabs/image-compression</text>
  </g>

  <!-- HERO TITLE -->
  <text x="640" y="208" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="104" font-weight="800" fill="#f1f5ff" letter-spacing="-3">Image Compression</text>

  <!-- Hero underline accent -->
  <rect x="540" y="232" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- SUBTITLE -->
  <text x="640" y="288" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="500" fill="#b8c8f0" letter-spacing="-0.5">Framework-agnostic. Pure browser. WebCodecs first.</text>

  <!-- 4-PATH CASCADE -->
  <!-- Layout: 4 chips, each 220w, gap 18, arrow 24, total = 4*220 + 3*(18+24) = 988, start = (1280-988)/2 = 146 -->
  <g transform="translate(146,360)">
    <!-- Chip 1: webcodecs-worker -->
    <g transform="translate(0,0)">
      <rect width="220" height="78" rx="14" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="4" fill="#5dd39e"/>
      <text x="22" y="50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="12" fill="#8aa0d8" font-weight="500" letter-spacing="1.5">PATH 1</text>
      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">webcodecs-worker</text>
    </g>
    <!-- Arrow 1→2 -->
    <g transform="translate(228,39)">
      <path d="M 0 0 L 30 0" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="30,-7 42,0 30,7" fill="#7aa2ff"/>
    </g>
    <!-- Chip 2: offscreen-worker -->
    <g transform="translate(274,0)">
      <rect width="220" height="78" rx="14" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="4" fill="#7aa2ff"/>
      <text x="22" y="50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="12" fill="#8aa0d8" font-weight="500" letter-spacing="1.5">PATH 2</text>
      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">offscreen-worker</text>
    </g>
    <!-- Arrow 2→3 -->
    <g transform="translate(502,39)">
      <path d="M 0 0 L 30 0" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="30,-7 42,0 30,7" fill="#7aa2ff"/>
    </g>
    <!-- Chip 3: canvas-main -->
    <g transform="translate(548,0)">
      <rect width="220" height="78" rx="14" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="4" fill="#9c7cff"/>
      <text x="22" y="50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="12" fill="#8aa0d8" font-weight="500" letter-spacing="1.5">PATH 3</text>
      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">canvas-main</text>
    </g>
    <!-- Arrow 3→4 -->
    <g transform="translate(776,39)">
      <path d="M 0 0 L 30 0" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="30,-7 42,0 30,7" fill="#7aa2ff"/>
    </g>
    <!-- Chip 4: server-fallback -->
    <g transform="translate(822,0)">
      <rect width="220" height="78" rx="14" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="4" fill="#c9a26b"/>
      <text x="22" y="50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="12" fill="#8aa0d8" font-weight="500" letter-spacing="1.5">PATH 4</text>
      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">server-fallback</text>
    </g>
  </g>

  <!-- WORKS WITH — 5 chips, pure SVG, brand-agnostic colors -->
  <g transform="translate(640,498)" text-anchor="middle">
    <text x="0" y="0" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="14" fill="#6e83b8" font-weight="600" letter-spacing="3">WORKS WITH</text>
    <!-- 5 framework chips: width 124, gap 16, total = 5*124 + 4*16 = 684, start = -342 -->
    <g transform="translate(-342,22)" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#dde4f5">
      <g transform="translate(0,0)">
        <rect width="124" height="42" rx="8" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1"/>
        <circle cx="22" cy="21" r="6" fill="#5dd4d0"/>
        <text x="38" y="28">React</text>
      </g>
      <g transform="translate(140,0)">
        <rect width="124" height="42" rx="8" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1"/>
        <circle cx="22" cy="21" r="6" fill="#5dd39e"/>
        <text x="38" y="28">Vue</text>
      </g>
      <g transform="translate(280,0)">
        <rect width="124" height="42" rx="8" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1"/>
        <circle cx="22" cy="21" r="6" fill="#ff6b35"/>
        <text x="38" y="28">Svelte</text>
      </g>
      <g transform="translate(420,0)">
        <rect width="124" height="42" rx="8" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1"/>
        <circle cx="22" cy="21" r="6" fill="#e5413d"/>
        <text x="38" y="28">Angular</text>
      </g>
      <g transform="translate(560,0)">
        <rect width="124" height="42" rx="8" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1"/>
        <circle cx="22" cy="21" r="6" fill="#f7df1e"/>
        <text x="38" y="28">Vanilla</text>
      </g>
    </g>
  </g>

  <!-- BOTTOM BAR: live demo URL (text only, no icons) -->
  <g transform="translate(64,608)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#7aa2ff" font-weight="500">Live demo · gkzlabs.github.io/image-compression</text>
  </g>
  <g transform="translate(1216,608)" text-anchor="end">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6e83b8" font-weight="500">MIT License · v0.10.25</text>
  </g>
</svg>
