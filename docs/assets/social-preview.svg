<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#111a36"/>
      <stop offset="1" stop-color="#0a0f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#9c7cff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2548" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0e1530" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#5d7dff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#5d7dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1a2548" stroke-width="1" opacity="0.35">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Top-left: package + npm version chip -->
  <g transform="translate(64,64)">
    <rect x="0" y="0" width="200" height="36" rx="18" fill="url(#chip)" stroke="#2a3766" stroke-width="1"/>
    <circle cx="20" cy="18" r="4" fill="#5dd39e"/>
    <text x="34" y="23" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#cbd5ff" font-weight="600">@gkzlabs/image-compression</text>
  </g>

  <!-- Hero title -->
  <text x="640" y="245" text-anchor="middle" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="78" font-weight="800" fill="#f1f5ff" letter-spacing="-2">
    Image Compression
  </text>
  <text x="640" y="305" text-anchor="middle" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="500" fill="#9bb0e8" letter-spacing="-0.5">
    Framework-agnostic. Pure browser. WebCodecs first.
  </text>

  <!-- 4-path cascade chips -->
  <g transform="translate(190,360)">
    <!-- chip 1: webcodecs-worker -->
    <g transform="translate(0,0)">
      <rect width="210" height="62" rx="12" fill="url(#chip)" stroke="#3a4d8c" stroke-width="1.5"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9bb0e8" font-weight="500">1.</text>
      <text x="20" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#f1f5ff" font-weight="600">webcodecs-worker</text>
    </g>
    <!-- arrow -->
    <path d="M 215 31 L 230 31" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" marker-end="none"/>
    <polygon points="228,26 235,31 228,36" fill="#7aa2ff"/>
    <!-- chip 2: offscreen-worker -->
    <g transform="translate(240,0)">
      <rect width="210" height="62" rx="12" fill="url(#chip)" stroke="#3a4d8c" stroke-width="1.5"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9bb0e8" font-weight="500">2.</text>
      <text x="20" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#f1f5ff" font-weight="600">offscreen-worker</text>
    </g>
    <!-- arrow -->
    <path d="M 455 31 L 470 31" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" marker-end="none"/>
    <polygon points="468,26 475,31 468,36" fill="#7aa2ff"/>
    <!-- chip 3: canvas-main -->
    <g transform="translate(480,0)">
      <rect width="210" height="62" rx="12" fill="url(#chip)" stroke="#3a4d8c" stroke-width="1.5"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9bb0e8" font-weight="500">3.</text>
      <text x="20" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#f1f5ff" font-weight="600">canvas-main</text>
    </g>
    <!-- arrow -->
    <path d="M 695 31 L 710 31" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" marker-end="none"/>
    <polygon points="708,26 715,31 708,36" fill="#7aa2ff"/>
    <!-- chip 4: server-fallback -->
    <g transform="translate(720,0)">
      <rect width="200" height="62" rx="12" fill="url(#chip)" stroke="#3a4d8c" stroke-width="1.5"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#9bb0e8" font-weight="500">4.</text>
      <text x="20" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#f1f5ff" font-weight="600">server-fallback</text>
    </g>
  </g>

  <!-- Framework row -->
  <g transform="translate(640,490)" text-anchor="middle">
    <text x="0" y="0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#6e83b8" font-weight="500" letter-spacing="2">WORKS WITH</text>
    <g transform="translate(-280,30)" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" fill="#cbd5ff">
      <text x="0" y="20">⚛️ React</text>
      <text x="140" y="20">💚 Vue</text>
      <text x="270" y="20">🔥 Svelte</text>
      <text x="420" y="20">🅰️ Angular</text>
      <text x="580" y="20">🟨 Vanilla JS</text>
    </g>
  </g>

  <!-- Bottom-right: live demo link -->
  <g transform="translate(1216,604)" text-anchor="end">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#7aa2ff" font-weight="500">▶ Live demo: gkzlabs.github.io/image-compression</text>
  </g>
</svg>
