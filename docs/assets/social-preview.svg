      <text x="22" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" fill="#f1f5ff" font-weight="700">canvas-main</text>
    </g>
    <g transform="translate(776,39)">
      <path d="M 0 0 L 30 0" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="30,-7 42,0 30,7" fill="#7aa2ff"/>
