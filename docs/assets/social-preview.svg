<?xml version="1.0" encoding="UTF-8"?>
<!--
  Social preview for @gkzlabs/image-compression
  Dimensions: 1280×640 (2:1, GitHub/Twitter card spec)
  Render to PNG: rsvg-convert -w 1280 -h 640 -f png social-preview.svg -o social-preview.png
  Hand-crafted SVG — all framework logos are inline (no external refs).
  Brand logos are from simpleicons.org (CC0, no attribution required).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="@gkzlabs/image-compression — framework-agnostic image compression for the browser. Works with React, Vue, Svelte, Angular, vanilla JavaScript. Live demo at gkzlabs.github.io/image-compression.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.5" stop-color="#15204a"/>
      <stop offset="1" stop-color="#0a0f1f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#5d7dff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5d7dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa2ff"/>
      <stop offset="1" stop-color="#9c7cff"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2548" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0e1530" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="chipStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a5fa0" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2a3766" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- TOP-LEFT PACKAGE BADGE -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="244" height="40" rx="20" fill="url(#chip)" stroke="url(#chipStroke)" stroke-width="1.5"/>
    <circle cx="22" cy="20" r="5" fill="#5dd39e"/>
    <text x="40" y="27" font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#cbd5ff" font-weight="600" letter-spacing="-0.2">@gkzlabs/image-compression</text>
  </g>

  <!-- HERO TITLE -->
  <text x="640" y="208" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="104" font-weight="800" fill="#f1f5ff" letter-spacing="-3">Image Compression</text>
  <rect x="540" y="232" width="200" height="4" rx="2" fill="url(#accent)"/>

  <!-- SUBTITLE -->
  <text x="640" y="288" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="500" fill="#b8c8f0" letter-spacing="-0.5">Framework-agnostic. Pure browser. WebCodecs first.</text>

